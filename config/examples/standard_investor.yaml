# Standard Investor Config - For investors with $5,000-$10,000
# Focus: Balance of quality and affordability

# Copy this to config_groq.yaml to use

ai_provider:
  service: "groq"
  groq_model: "llama-3.1-70b-versatile"
  fallback_to_rules: true

screening:
  enabled: true
  strategy: "small_cap_growth"
  stock_universe: "SP500"
  
  # STANDARD SETTINGS - Stocks under $100
  max_price_per_share: 100       # 🎯 KEY: Maximum $100 per share
  
  custom_filters:
    min_market_cap: 300_000_000
    max_market_cap: 2_000_000_000
    min_price: 10                 # Quality threshold
    max_price: 100                # Match max_price_per_share
    min_revenue_growth: 0.20
    min_earnings_growth: 0.15
    positive_earnings: true
    min_volume: 500_000
    sectors:
      - "Technology"
      - "Healthcare"
      - "Consumer Discretionary"
      - "Industrials"
      - "Communication Services"
  
  max_stocks: 50

analysis:
  value:
    max_pe_ratio: 25
    max_pb_ratio: 3.0
    max_debt_equity: 2.0
    min_dividend_yield: 0.00
  
  growth:
    min_earnings_growth: 0.20
    min_revenue_growth: 0.25
    min_market_cap: 300_000_000
    max_market_cap: 2_000_000_000
  
  technical:
    rsi_oversold: 30
    rsi_overbought: 70
    ma_short_period: 50
    ma_long_period: 200
  
  weights:
    value: 0.20
    growth: 0.50
    technical: 0.30

data_sources:
  primary: "yfinance"
  cache_duration: 3600

stocks:
  test_tickers:
    - "SQ"       # Block - ~$78
    - "AMD"      # AMD - ~$95
    - "SHOP"     # Shopify - ~$85
    - "DDOG"     # Datadog - ~$92
    - "NET"      # Cloudflare - ~$75

logging:
  level: "INFO"
  file: "logs/agent.log"
  max_size_mb: 10
  backup_count: 5

recommendations:
  confidence_threshold: 0.6
  min_score_for_buy: 65
  min_score_for_hold: 40

optimization:
  parallel_analysis: false
  batch_size: 10
  save_results: true
  results_file: "data/standard_analysis.json"

# Portfolio Example with $10,000:
# - 10 stocks × $1,000 each
# - Each stock: 10-100 shares
# - Excellent diversification
# - Quality small cap growth stocks
